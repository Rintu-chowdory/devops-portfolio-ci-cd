apiVersion: apps/v1
kind: Deployment
metadata:
  name: german-bureaucracy-helper
  labels:
    app: bureaucracy-helper
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bureaucracy-helper
  template:
    metadata:
      labels:
        app: bureaucracy-helper
    spec:
      containers:
      - name: app
        image: ghcr.io/rintu-chowdory/german-bureaucracy-helper:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
